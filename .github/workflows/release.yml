name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Read crate version
        id: crate
        run: echo "version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; metadata=json.load(sys.stdin); print(next(pkg[\"version\"] for pkg in metadata[\"packages\"] if pkg[\"name\"] == \"webots\"))')" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches crate version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
          CRATE_VERSION: ${{ steps.crate.outputs.version }}
        run: test "$TAG_NAME" = "v$CRATE_VERSION"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: Verify packaging
        run: cargo package --locked

      - name: Publish crate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
